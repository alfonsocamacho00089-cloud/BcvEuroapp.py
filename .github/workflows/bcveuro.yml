name: Actualizador de Tasas BCV

on:
  schedule:
    # CADA 5 MIN de 4:00 PM a 6:59 PM Vzla (Hora UTC: 20:00 a 22:59)
    - cron: '*/5 20-22 * * *'
    - cron: '45 19 * * *'
  workflow_dispatch: # Esto te permite darle a un botón para actualizar YA

jobs:
  actualizar-data:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v2

      - name: Instalar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Instalar Librerías
        run: pip install requests firebase-admin
        
      - name: Correr Script
        run: python BcvEuroapp.py

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'Robot-BCV'
          git config --global user.email 'robot@github.com'
          git add Bcveuro.json
          git commit -m "Tasas actualizadas automáticamente" || echo "No hay cambios"
          git push
