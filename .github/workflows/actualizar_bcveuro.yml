name: Actualizador de Tasas BCV

on:
  schedule:
    # Corre cada 15 min de 4:00 PM a 7:59 PM (Hora Vzla) de Lunes a Viernes
    # (20:00 a 00:00 UTC)
    - cron: '*/15 20-23 * * 1-5'

  workflow_dispatch: # Mantiene el botón verde activo
jobs:
  actualizar-data:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v2

      - name: Instalar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Instalar Librerías
        run: pip install requests firebase-admin beautifulsoup4
    
      - name: Run Script
        run: python BcvEuroapp.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'Robot'
          git config --global user.email 'robot@github.com'
          git add Bcveuro.json Bcveuro_proxima.json Bcveuro_vigente.json
          git commit -m "Tasas actualizadas: General, Proxima y Vigente" || exit 0
          git pull --rebase origin main
          git push
